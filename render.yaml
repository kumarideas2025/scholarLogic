# Render.com Deployment Configuration
#
# This file lets Render auto-deploy the backend as a Web Service.
# Connect this repo in the Render dashboard and select "Blueprint" to use it.
#
# Required environment variables must be set in the Render dashboard
# (see .env.example for the full list). Secrets are injected at runtime.

services:
  - type: web
    name: scholarlogic-api
    runtime: node
    region: oregon # change to your preferred region
    plan: starter # upgrade for production traffic
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # The following must be added manually in the Render dashboard:
      # MONGODB_URI, ACCESS_TOKEN_SECRET, REFRESH_TOKEN_SECRET, COOKIE_SECRET,
      # CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET,
      # EMAIL_HOST, EMAIL_PORT, EMAIL_USER, EMAIL_PASS, EMAIL_FROM,
      # CLIENT_URL, CORS_ORIGIN
