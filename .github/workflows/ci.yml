name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Run tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/scholarlogic_test
          ACCESS_TOKEN_SECRET: ci_access_secret
          REFRESH_TOKEN_SECRET: ci_refresh_secret
          COOKIE_SECRET: ci_cookie_secret
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          EMAIL_HOST: localhost
          EMAIL_PORT: 587
          EMAIL_USER: ci@ci.com
          EMAIL_PASS: ci
          EMAIL_FROM: ci@ci.com
          CLIENT_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3000
        run: npm test
